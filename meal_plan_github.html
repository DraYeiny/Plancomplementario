<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Plan de Alimentación Semanal</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(135deg, #fff9f0 0%, #f0e6ff 100%);
  min-height: 100vh; padding: 24px 12px;
}

/* ── DATE PICKER ── */
.date-field { position: relative; display: inline-block; }
.date-field input[type="text"] {
  border: none; border-bottom: 2px dashed #c9a8f0;
  background: transparent; font-family: 'Nunito', sans-serif;
  font-size: 0.92rem; color: #444; outline: none;
  padding: 2px 28px 2px 6px; width: 120px; cursor: pointer;
}
.date-field .cal-icon {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  font-size: 1rem; cursor: pointer; pointer-events: none;
}
.cal-popup {
  display: none; position: absolute; top: calc(100% + 6px); left: 0;
  background: white; border-radius: 16px; padding: 12px;
  box-shadow: 0 8px 28px rgba(107,79,158,0.2); z-index: 9999;
  min-width: 230px; user-select: none;
}
.cal-popup.open { display: block; }
.cal-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.cal-nav button {
  background: #f0e6ff; border: none; border-radius: 8px;
  width: 28px; height: 28px; cursor: pointer; font-size: 1rem;
  color: #6b4f9e; font-weight: 800; display: flex; align-items: center; justify-content: center;
}
.cal-nav button:hover { background: #d4b3f0; }
.cal-title { font-weight: 800; color: #6b4f9e; font-size: 0.9rem; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; text-align: center; }
.cal-grid .dow { font-size: 0.68rem; font-weight: 800; color: #aaa; padding: 3px 0; }
.cal-grid .day {
  font-size: 0.78rem; font-weight: 700; padding: 5px 2px;
  border-radius: 8px; cursor: pointer; color: #444;
}
.cal-grid .day:hover { background: #f0e6ff; color: #6b4f9e; }
.cal-grid .day.today { border: 2px solid #a78bfa; color: #6b4f9e; }
.cal-grid .day.selected { background: #7c3aed; color: white; border-radius: 8px; }
.cal-grid .day.other-month { color: #ccc; }
.cal-grid .day.empty { cursor: default; }

/* ── PAGE CARD ── */
.page {
  background: white; border-radius: 28px; padding: 28px 24px;
  box-shadow: 0 8px 32px rgba(107,79,158,0.12);
  max-width: 1140px; margin: 0 auto 32px;
}
.header { text-align: center; margin-bottom: 18px; }
.header .emojis { font-size: 1.6rem; letter-spacing: 6px; margin-bottom: 4px; }
.header h1 { font-size: 1.7rem; font-weight: 800; color: #6b4f9e; }
.header p  { font-size: 0.85rem; color: #aaa; margin-top: 3px; }

.controls-bar {
  display: flex; flex-wrap: wrap; gap: 14px; align-items: center;
  background: #f8f0ff; border-radius: 16px; padding: 12px 20px; margin-bottom: 18px;
}
.controls-bar label { font-weight: 700; color: #6b4f9e; font-size: 0.88rem; white-space: nowrap; }
.controls-bar input[type="text"]#childName {
  border: none; border-bottom: 2px dashed #c9a8f0; background: transparent;
  font-family: 'Nunito', sans-serif; font-size: 0.92rem; color: #444;
  outline: none; padding: 2px 6px; flex: 1; min-width: 120px;
}
.week-badge {
  margin-left: auto; background: #7c3aed; color: white;
  border-radius: 50px; padding: 4px 14px; font-size: 0.8rem; font-weight: 800;
}

.legend { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 14px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.8rem; font-weight: 700; color: #555; }
.legend-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.dot-cereal { background:#ffe082; } .dot-fruta { background:#ffb3b3; }
.dot-verdura { background:#b5ead7; } .dot-proteina { background:#d4b3f0; }

/* ── WEEK TABS ── */
.tabs-bar {
  display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; justify-content: center;
}
.tab-btn {
  padding: 7px 18px; border: 2px solid #e0d4f7; border-radius: 50px;
  background: white; font-family: 'Nunito', sans-serif; font-size: 0.8rem;
  font-weight: 700; color: #6b4f9e; cursor: pointer; transition: all 0.15s;
}
.tab-btn:hover { background: #f0e6ff; }
.tab-btn.active { background: #7c3aed; color: white; border-color: #7c3aed; }

/* ── WEEK SHEET ── */
.week-sheet { display: none; }
.week-sheet.visible { display: block; }
.sheet-title {
  text-align: center; font-size: 0.9rem; font-weight: 800;
  color: #6b4f9e; margin-bottom: 10px; background: #f8f0ff;
  border-radius: 12px; padding: 6px;
}

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: separate; border-spacing: 3px; font-size: 0.78rem; }
th.day-header {
  background: #f0e6ff; color: #6b4f9e; font-weight: 800; font-size: 0.8rem;
  text-align: center; padding: 8px 3px; border-radius: 10px;
}
th.empty-corner { background: transparent; }
td.meal-header {
  font-weight: 800; font-size: 0.82rem; text-align: center; padding: 5px 6px;
  border-radius: 10px; vertical-align: middle; white-space: nowrap;
}
.meal-desayuno { background:#fff3cd; color:#b8860b; }
.meal-almuerzo { background:#d4edda; color:#276a3e; }
.meal-cena     { background:#dce8ff; color:#2a56a8; }
td.sub-header {
  font-weight: 700; font-size: 0.72rem; padding: 4px 7px;
  border-radius: 8px; text-align: right; white-space: nowrap; vertical-align: middle;
}
.sub-cereal   { background:#fff8dc; color:#997a00; }
.sub-fruta    { background:#ffe4e4; color:#b03030; }
.sub-verdura  { background:#e8f5ee; color:#2e7d52; }
.sub-proteina { background:#f0e6ff; color:#6b4f9e; }
td.cell { padding: 2px; border-radius: 7px; vertical-align: middle; }
.cell-cereal   { background:#fffbea; } .cell-fruta    { background:#fff0f0; }
.cell-verdura  { background:#f0fbf5; } .cell-proteina { background:#f7f0ff; }

.cell-edit {
  display: flex; align-items: center; justify-content: center;
  height: 36px; border: 1.5px dashed #ccc; border-radius: 6px;
  padding: 0 5px; cursor: text; overflow: hidden;
  transition: border-color 0.2s, background 0.2s;
  font-family: 'Nunito', sans-serif; font-weight: 700;
  color: #444; font-size: 13px; text-align: center;
  line-height: 36px; white-space: nowrap; outline: none;
}
.cell-edit:focus { border-color: #9b7fd4; border-style: solid; background: #faf5ff; }
.cell-edit:empty::before {
  content: attr(data-placeholder); color: #ccc; font-size: 11px; font-weight: 400;
}
tr.spacer td { height: 6px; background: transparent; }

/* ── BUTTONS ── */
.btn-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 22px; }
.btn {
  display: flex; align-items: center; gap: 7px; padding: 10px 22px;
  border: none; border-radius: 50px; font-family: 'Nunito', sans-serif;
  font-size: 0.88rem; font-weight: 800; cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 14px rgba(0,0,0,0.12);
}
.btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.17); }
.btn:active { transform: translateY(0); }
.btn-save  { background: linear-gradient(135deg,#a78bfa,#7c3aed); color:#fff; }
.btn-pdf   { background: linear-gradient(135deg,#f9a8d4,#ec4899); color:#fff; }
.btn-clear { background: linear-gradient(135deg,#fca5a5,#ef4444); color:#fff; }

.footer { text-align: center; margin-top: 16px; font-size: 0.72rem; color: #ccc; }

#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #6b4f9e; color: white; padding: 9px 24px; border-radius: 50px;
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.85rem;
  opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 99999;
}
#toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <div class="emojis">🌟 🥦 🍎 🥣 🍗 🌟</div>
    <h1>🍽️ Mi Plan de Alimentación Semanal</h1>
    <p>¡Comer bien es divertido y delicioso!</p>
  </div>

  <div class="controls-bar">
    <label>👦 Nombre:</label>
    <input type="text" id="childName" placeholder="Escribe tu nombre aquí..." oninput="autoSave()">
    <label>📅 Del:</label>
    <div class="date-field" id="df-start">
      <input type="text" id="dateStart" placeholder="dd/mm/aaaa" readonly>
      <span class="cal-icon">📅</span>
      <div class="cal-popup" id="cal-start"></div>
    </div>
    <label>al:</label>
    <div class="date-field" id="df-end">
      <input type="text" id="dateEnd" placeholder="dd/mm/aaaa" readonly>
      <span class="cal-icon">📅</span>
      <div class="cal-popup" id="cal-end"></div>
    </div>
    <span class="week-badge" id="weekBadge">0 semanas</span>
  </div>

  <div class="legend">
    <div class="legend-item"><span class="legend-dot dot-cereal"></span>Cereal / Carbohidratos</div>
    <div class="legend-item"><span class="legend-dot dot-fruta"></span>Fruta</div>
    <div class="legend-item"><span class="legend-dot dot-verdura"></span>Verdura</div>
    <div class="legend-item"><span class="legend-dot dot-proteina"></span>Proteína</div>
  </div>

  <div class="tabs-bar" id="tabsBar"></div>
  <div id="sheetsContainer"></div>

  <div class="btn-row">
    <button class="btn btn-save"  onclick="saveData()">💾 Guardar</button>
    <button class="btn btn-pdf"   onclick="downloadAllPDF()">📄 Descargar PDF</button>
    <button class="btn btn-clear" onclick="clearAll()">🗑️ Limpiar</button>
  </div>
  <div class="footer">✨ Plantilla de alimentación · Datos guardados automáticamente</div>
</div>

<div id="toast"></div>

<script>
/* ══════════ CONFIG ══════════ */
const KEY  = 'mealPlan_v4';
const DAYS_LABELS = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const DAY_ICONS   = ['🌙','🔥','⚡','🌈','🎉','⭐','🌞'];
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DOWS   = ['Do','Lu','Ma','Mi','Ju','Vi','Sá'];

const meals = [
  { id:'desayuno', label:'☀️ Desayuno', hClass:'meal-desayuno',
    subs:[{id:'cereal',icon:'🥣',label:'Cereal',sClass:'sub-cereal',cClass:'cell-cereal'},
          {id:'fruta', icon:'🍎',label:'Fruta', sClass:'sub-fruta', cClass:'cell-fruta'},
          {id:'verdura',icon:'🥦',label:'Verdura',sClass:'sub-verdura',cClass:'cell-verdura'}]},
  { id:'almuerzo', label:'🌤️ Almuerzo', hClass:'meal-almuerzo',
    subs:[{id:'cereal',  icon:'🥣',label:'Cereal',  sClass:'sub-cereal',  cClass:'cell-cereal'},
          {id:'fruta',   icon:'🍎',label:'Fruta',   sClass:'sub-fruta',   cClass:'cell-fruta'},
          {id:'verdura', icon:'🥦',label:'Verdura', sClass:'sub-verdura', cClass:'cell-verdura'},
          {id:'proteina',icon:'🍗',label:'Proteína',sClass:'sub-proteina',cClass:'cell-proteina'}]},
  { id:'cena', label:'🌙 Cena', hClass:'meal-cena',
    subs:[{id:'cereal',  icon:'🥣',label:'Cereal',  sClass:'sub-cereal',  cClass:'cell-cereal'},
          {id:'fruta',   icon:'🍎',label:'Fruta',   sClass:'sub-fruta',   cClass:'cell-fruta'},
          {id:'verdura', icon:'🥦',label:'Verdura', sClass:'sub-verdura', cClass:'cell-verdura'},
          {id:'proteina',icon:'🍗',label:'Proteína',sClass:'sub-proteina',cClass:'cell-proteina'}]}
];

/* ══════════ STATE ══════════ */
let startDate = null, endDate = null, numWeeks = 0;

/* ══════════ DATE HELPERS ══════════ */
function toddmmyyyy(d) {
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
}
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function isSameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function weeksBetween(a,b){
  const ms = b - a;
  return Math.max(1, Math.ceil(ms / (7*24*3600*1000)));
}
function getWeekStart(base, weekIdx){
  // always start from Monday of the week containing base
  const d = new Date(base);
  const dow = d.getDay(); // 0=Sun
  const diff = dow === 0 ? -6 : 1 - dow;
  d.setDate(d.getDate() + diff + weekIdx*7);
  return d;
}

/* ══════════ MINI CALENDAR ══════════ */
function buildCal(popupEl, inputEl, onPick) {
  let cur = new Date();
  function render() {
    const y = cur.getFullYear(), m = cur.getMonth();
    const first = new Date(y,m,1).getDay(); // 0=Sun
    const days  = new Date(y,m+1,0).getDate();
    const today = new Date();
    let html = `<div class="cal-nav">
      <button onclick="calPrev_${popupEl.id}()">‹</button>
      <span class="cal-title">${MONTHS[m]} ${y}</span>
      <button onclick="calNext_${popupEl.id}()">›</button>
    </div><div class="cal-grid">`;
    DOWS.forEach(d => html += `<div class="dow">${d}</div>`);
    // offset (Sunday=0 → pad 0, Monday=1 → pad 1 …)
    const pad = first; // days before 1st
    for(let i=0;i<pad;i++) html+=`<div class="day empty"></div>`;
    for(let d=1;d<=days;d++){
      const dt = new Date(y,m,d);
      let cls = 'day';
      if(isSameDay(dt,today)) cls+=' today';
      const selVal = inputEl.value;
      if(selVal){
        const parts=selVal.split('/');
        if(parts.length===3){
          const sel=new Date(+parts[2],+parts[1]-1,+parts[0]);
          if(isSameDay(dt,sel)) cls+=' selected';
        }
      }
      html+=`<div class="${cls}" onclick="calPick_${popupEl.id}(${y},${m},${d})">${d}</div>`;
    }
    html+='</div>';
    popupEl.innerHTML = html;
  }
  window[`calPrev_${popupEl.id}`] = () => { cur.setMonth(cur.getMonth()-1); render(); };
  window[`calNext_${popupEl.id}`] = () => { cur.setMonth(cur.getMonth()+1); render(); };
  window[`calPick_${popupEl.id}`] = (y,m,d) => {
    const dt = new Date(y,m,d);
    inputEl.value = toddmmyyyy(dt);
    popupEl.classList.remove('open');
    onPick(dt);
    render();
  };
  render();
  return render;
}

/* ══════════ INIT CALENDARS ══════════ */
const today = new Date();

const renderCalStart = buildCal(
  document.getElementById('cal-start'),
  document.getElementById('dateStart'),
  dt => { startDate = dt; onDatesChange(); }
);
const renderCalEnd = buildCal(
  document.getElementById('cal-end'),
  document.getElementById('dateEnd'),
  dt => { endDate = dt; onDatesChange(); }
);

// Set today as default
startDate = new Date(today);
endDate   = new Date(today);
document.getElementById('dateStart').value = toddmmyyyy(startDate);
document.getElementById('dateEnd').value   = toddmmyyyy(endDate);

// Toggle popups
function toggleCal(showId, hideId, renderFn) {
  const show = document.getElementById(showId);
  const hide = document.getElementById(hideId);
  const isOpen = show.classList.contains('open');
  hide.classList.remove('open');
  if (isOpen) { show.classList.remove('open'); }
  else { show.classList.add('open'); renderFn(); }
}

document.getElementById('dateStart').addEventListener('click', e => {
  e.stopPropagation();
  toggleCal('cal-start','cal-end', renderCalStart);
});
document.querySelector('#df-start .cal-icon').addEventListener('click', e => {
  e.stopPropagation();
  toggleCal('cal-start','cal-end', renderCalStart);
});
document.getElementById('dateEnd').addEventListener('click', e => {
  e.stopPropagation();
  toggleCal('cal-end','cal-start', renderCalEnd);
});
document.querySelector('#df-end .cal-icon').addEventListener('click', e => {
  e.stopPropagation();
  toggleCal('cal-end','cal-start', renderCalEnd);
});
document.getElementById('cal-start').addEventListener('click', e => e.stopPropagation());
document.getElementById('cal-end').addEventListener('click',   e => e.stopPropagation());
document.addEventListener('click', () => {
  document.getElementById('cal-start').classList.remove('open');
  document.getElementById('cal-end').classList.remove('open');
});

/* ══════════ SHEETS ══════════ */
function onDatesChange() {
  if (!startDate || !endDate) return;
  if (endDate < startDate) { endDate = new Date(startDate); document.getElementById('dateEnd').value = toddmmyyyy(endDate); }
  numWeeks = weeksBetween(startDate, endDate);
  document.getElementById('weekBadge').textContent = numWeeks + (numWeeks===1?' semana':' semanas');
  rebuildSheets();
  autoSave();
}

function rebuildSheets() {
  const tabsBar  = document.getElementById('tabsBar');
  const container = document.getElementById('sheetsContainer');
  // save existing data before rebuild
  const existing = collectCells();

  tabsBar.innerHTML = '';
  container.innerHTML = '';

  for (let w = 0; w < numWeeks; w++) {
    const ws = getWeekStart(startDate, w);
    const we = addDays(ws, 6);
    const label = `Sem ${w+1}: ${toddmmyyyy(ws)}`;

    // Tab button
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (w===0?' active':'');
    btn.textContent = label;
    btn.dataset.week = w;
    btn.onclick = () => switchTab(w);
    tabsBar.appendChild(btn);

    // Sheet
    const sheet = document.createElement('div');
    sheet.className = 'week-sheet' + (w===0?' visible':'');
    sheet.id = 'sheet-' + w;

    const title = document.createElement('div');
    title.className = 'sheet-title';
    // build day headers with actual dates
    const dayHeaders = DAYS_LABELS.map((dl,i) => {
      const dd = addDays(ws, i);
      return `${DAY_ICONS[i]}<br>${dl}<br><small style="font-size:0.65rem;font-weight:700;color:#888">${dd.getDate()}/${dd.getMonth()+1}</small>`;
    });
    title.textContent = `📅 Del ${toddmmyyyy(ws)} al ${toddmmyyyy(we)}`;
    sheet.appendChild(title);

    const wrap = document.createElement('div');
    wrap.className = 'table-wrap';
    wrap.appendChild(buildTable(w, dayHeaders));
    sheet.appendChild(wrap);
    container.appendChild(sheet);
  }

  // Restore data
  restoreCells(existing);
}

function switchTab(w) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', +b.dataset.week===w));
  document.querySelectorAll('.week-sheet').forEach(s => s.classList.toggle('visible', s.id==='sheet-'+w));
}

function buildTable(weekIdx, dayHeaders) {
  const tbl = document.createElement('table');
  const thead = document.createElement('thead');
  const hrow = document.createElement('tr');
  ['',''].forEach(w => { const th=document.createElement('th'); th.className='empty-corner'; th.style.width=w?'78px':'88px'; hrow.appendChild(th); });
  dayHeaders.forEach(h => {
    const th = document.createElement('th');
    th.className = 'day-header'; th.innerHTML = h; hrow.appendChild(th);
  });
  thead.appendChild(hrow); tbl.appendChild(thead);

  const tbody = document.createElement('tbody');
  meals.forEach((meal, mi) => {
    meal.subs.forEach((sub, si) => {
      const tr = document.createElement('tr');
      if (si===0) {
        const td = document.createElement('td');
        td.rowSpan = meal.subs.length; td.className = 'meal-header ' + meal.hClass;
        td.innerHTML = meal.label.replace(' ','<br>'); tr.appendChild(td);
      }
      const std = document.createElement('td');
      std.className = 'sub-header ' + sub.sClass;
      std.innerHTML = sub.icon+' '+sub.label; tr.appendChild(std);
      for (let d=0; d<7; d++) {
        const ctd = document.createElement('td');
        ctd.className = 'cell ' + sub.cClass;
        const div = document.createElement('div');
        div.className = 'cell-edit';
        div.contentEditable = 'true';
        div.dataset.id = `w${weekIdx}_${meal.id}_${sub.id}_${d}`;
        div.dataset.placeholder = '...';
        div.spellcheck = false;
        div.addEventListener('input', autoSave);
        div.addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();div.blur();} });
        div.addEventListener('paste', e => {
          e.preventDefault();
          const t = (e.clipboardData||window.clipboardData).getData('text/plain').replace(/\n/g,' ');
          document.execCommand('insertText',false,t);
        });
        ctd.appendChild(div); tr.appendChild(ctd);
      }
      tbody.appendChild(tr);
    });
    if (mi < meals.length-1) {
      const sp=document.createElement('tr'); sp.className='spacer';
      const td=document.createElement('td'); td.colSpan=9; sp.appendChild(td); tbody.appendChild(sp);
    }
  });
  tbl.appendChild(tbody);
  return tbl;
}

/* ══════════ SAVE / LOAD ══════════ */
function collectCells() {
  const out = {};
  document.querySelectorAll('.cell-edit').forEach(el => {
    out[el.dataset.id] = el.innerText.trim();
  });
  return out;
}
function restoreCells(cells) {
  if (!cells) return;
  Object.entries(cells).forEach(([id,v]) => {
    const el = document.querySelector(`[data-id="${id}"]`);
    if (el && v) el.innerText = v;
  });
}
function collect() {
  return {
    childName: document.getElementById('childName').value,
    dateStart: document.getElementById('dateStart').value,
    dateEnd:   document.getElementById('dateEnd').value,
    cells: collectCells()
  };
}
function apply(d) {
  if (!d) return;
  if (d.childName) document.getElementById('childName').value = d.childName;
  if (d.dateStart) {
    document.getElementById('dateStart').value = d.dateStart;
    const p=d.dateStart.split('/'); startDate=new Date(+p[2],+p[1]-1,+p[0]);
  }
  if (d.dateEnd) {
    document.getElementById('dateEnd').value = d.dateEnd;
    const p=d.dateEnd.split('/'); endDate=new Date(+p[2],+p[1]-1,+p[0]);
  }
  onDatesChange();
  if (d.cells) restoreCells(d.cells);
}
function saveData() {
  try { localStorage.setItem(KEY, JSON.stringify(collect())); toast('💾 ¡Guardado!'); }
  catch(e) { toast('⚠️ Error al guardar'); }
}
function autoSave() {
  try { localStorage.setItem(KEY, JSON.stringify(collect())); } catch(e) {}
}
function clearAll() {
  if (!confirm('¿Borrar todo el contenido? 🗑️')) return;
  document.querySelectorAll('.cell-edit').forEach(el => el.innerText='');
  document.getElementById('childName').value='';
  try { localStorage.removeItem(KEY); } catch(e) {}
}

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

/* ══════════ PDF ══════════ */
function downloadAllPDF() {
  toast('⏳ Cargando librerías...');
  const libs = [
    { src:'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js',        check:()=>window.jspdf },
    { src:'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js', check:()=>window.html2canvas }
  ];
  let loaded=0;
  libs.forEach(lib=>{
    if(lib.check()){if(++loaded===libs.length)runPDF();return;}
    const s=document.createElement('script'); s.src=lib.src;
    s.onload=()=>{if(++loaded===libs.length)runPDF();};
    s.onerror=()=>toast('❌ Sin conexión');
    document.head.appendChild(s);
  });
}

async function runPDF() {
  toast('⏳ Generando PDF...');
  const name = document.getElementById('childName').value||'plan-alimentacion';
  const filename = name.trim().replace(/\s+/g,'_')+'.pdf';
  const pdf = new window.jspdf.jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  const pageW=297,pageH=210,margin=5;

  const btnRow = document.querySelector('.btn-row');
  const footer = document.querySelector('.footer');
  const tabsBar = document.getElementById('tabsBar');
  btnRow.style.display='none'; footer.style.display='none'; tabsBar.style.display='none';

  for (let w=0; w<numWeeks; w++) {
    // Show only this sheet
    document.querySelectorAll('.week-sheet').forEach(s=>s.style.display='none');
    const sheet = document.getElementById('sheet-'+w);
    sheet.style.display='block';
    if(w>0) pdf.addPage();
    await new Promise(r=>setTimeout(r,80));
    const canvas = await html2canvas(document.querySelector('.page'),{
      scale:2,useCORS:true,scrollX:0,scrollY:-window.scrollY,
      windowWidth:1200,
      width:document.querySelector('.page').scrollWidth,
      height:document.querySelector('.page').scrollHeight
    });
    const img=canvas.toDataURL('image/jpeg',1.0);
    const ratio=canvas.width/canvas.height;
    const maxW=pageW-margin*2, maxH=pageH-margin*2;
    let iW=maxW,iH=maxW/ratio;
    if(iH>maxH){iH=maxH;iW=maxH*ratio;}
    pdf.addImage(img,'JPEG',(pageW-iW)/2,(pageH-iH)/2,iW,iH);
  }

  // Restore UI
  btnRow.style.display=''; footer.style.display=''; tabsBar.style.display='';
  // Restore tab visibility
  document.querySelectorAll('.week-sheet').forEach((s,i)=>s.style.display=i===0?'block':'none');
  switchTab(0);
  pdf.save(filename);
  toast('✅ PDF descargado: '+filename);
}

/* ══════════ BOOT ══════════ */
onDatesChange(); // build initial single week
try { apply(JSON.parse(localStorage.getItem(KEY))); } catch(e) {}
</script>
