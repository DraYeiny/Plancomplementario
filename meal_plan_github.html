<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Plan de Alimentación Semanal</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(135deg, #fff9f0 0%, #f0e6ff 100%);
  min-height: 100vh; padding: 24px 12px;
}

/* ── CALENDAR MODAL ── */
#calOverlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.18); z-index: 9000;
  align-items: center; justify-content: center;
}
#calOverlay.open { display: flex; }
#calBox {
  background: white; border-radius: 20px; padding: 18px;
  box-shadow: 0 12px 40px rgba(107,79,158,0.25);
  min-width: 260px; user-select: none;
}
.cal-nav {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
}
.cal-nav button {
  background: #f0e6ff; border: none; border-radius: 10px;
  width: 32px; height: 32px; cursor: pointer; font-size: 1.1rem;
  color: #6b4f9e; font-weight: 900; display: flex; align-items: center; justify-content: center;
}
.cal-nav button:hover { background: #d4b3f0; }
.cal-title { font-weight: 800; color: #6b4f9e; font-size: 1rem; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; text-align: center; }
.cal-grid .dow { font-size: 0.7rem; font-weight: 800; color: #aaa; padding: 4px 0; }
.cal-grid .day {
  font-size: 0.85rem; font-weight: 700; padding: 7px 2px;
  border-radius: 10px; cursor: pointer; color: #444;
}
.cal-grid .day:hover { background: #f0e6ff; color: #6b4f9e; }
.cal-grid .day.today { border: 2px solid #a78bfa; color: #6b4f9e; }
.cal-grid .day.selected { background: #7c3aed; color: white; }
.cal-grid .day.other-month { color: #ddd; pointer-events: none; }
.cal-close-row { text-align: center; margin-top: 12px; }
.cal-close-row button {
  background: #f0e6ff; border: none; border-radius: 50px;
  padding: 7px 22px; font-family: 'Nunito', sans-serif;
  font-weight: 800; color: #6b4f9e; cursor: pointer; font-size: 0.85rem;
}

/* ── PAGE ── */
.page {
  background: white; border-radius: 28px; padding: 28px 24px;
  box-shadow: 0 8px 32px rgba(107,79,158,0.12);
  max-width: 1140px; margin: 0 auto 32px;
}
.header { text-align: center; margin-bottom: 18px; }
.header .emojis { font-size: 1.6rem; letter-spacing: 6px; margin-bottom: 4px; }
.header h1 { font-size: 1.7rem; font-weight: 800; color: #6b4f9e; }
.header p  { font-size: 0.85rem; color: #aaa; margin-top: 3px; }

.controls-bar {
  display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
  background: #f8f0ff; border-radius: 16px; padding: 12px 20px; margin-bottom: 18px;
}
.controls-bar label { font-weight: 700; color: #6b4f9e; font-size: 0.88rem; white-space: nowrap; }
#childName {
  border: none; border-bottom: 2px dashed #c9a8f0; background: transparent;
  font-family: 'Nunito', sans-serif; font-size: 0.92rem; color: #444;
  outline: none; padding: 2px 6px; flex: 1; min-width: 120px;
}
.date-btn {
  display: flex; align-items: center; gap: 6px;
  background: white; border: 2px dashed #c9a8f0; border-radius: 10px;
  padding: 5px 12px; cursor: pointer; font-family: 'Nunito', sans-serif;
  font-size: 0.88rem; font-weight: 700; color: #6b4f9e;
  transition: background 0.15s, border-color 0.15s;
}
.date-btn:hover { background: #f0e6ff; border-color: #a78bfa; }
.week-badge {
  margin-left: auto; background: #7c3aed; color: white;
  border-radius: 50px; padding: 4px 14px; font-size: 0.8rem; font-weight: 800;
}

.legend { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 14px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.8rem; font-weight: 700; color: #555; }
.legend-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.dot-cereal{background:#ffe082;} .dot-fruta{background:#ffb3b3;}
.dot-verdura{background:#b5ead7;} .dot-proteina{background:#d4b3f0;}

.tabs-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; justify-content: center; }
.tab-btn {
  padding: 7px 16px; border: 2px solid #e0d4f7; border-radius: 50px;
  background: white; font-family: 'Nunito', sans-serif; font-size: 0.78rem;
  font-weight: 700; color: #6b4f9e; cursor: pointer; transition: all 0.15s;
}
.tab-btn:hover { background: #f0e6ff; }
.tab-btn.active { background: #7c3aed; color: white; border-color: #7c3aed; }

/* FIX: no usar display:none para ocultar sheets — innerText devuelve ""
   en elementos con display:none en Chrome, borrando datos al hacer autoSave.
   En su lugar ocultamos visualmente pero mantenemos el elemento en el layout. */
.week-sheet {
  position: absolute;
  visibility: hidden;
  pointer-events: none;
  height: 0;
  overflow: hidden;
}
.week-sheet.visible {
  position: static;
  visibility: visible;
  pointer-events: auto;
  height: auto;
  overflow: visible;
}
.sheet-title {
  text-align: center; font-size: 0.88rem; font-weight: 800; color: #6b4f9e;
  margin-bottom: 10px; background: #f8f0ff; border-radius: 12px; padding: 6px;
}

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: separate; border-spacing: 3px; font-size: 0.78rem; }
th.day-header {
  background: #f0e6ff; color: #6b4f9e; font-weight: 800; font-size: 0.78rem;
  text-align: center; padding: 8px 3px; border-radius: 10px;
}
th.empty-corner { background: transparent; }
td.meal-header {
  font-weight: 800; font-size: 0.82rem; text-align: center; padding: 5px 6px;
  border-radius: 10px; vertical-align: middle; white-space: nowrap;
}
.meal-desayuno{background:#fff3cd;color:#b8860b;}
.meal-almuerzo{background:#d4edda;color:#276a3e;}
.meal-cena    {background:#dce8ff;color:#2a56a8;}
td.sub-header {
  font-weight: 700; font-size: 0.72rem; padding: 4px 7px;
  border-radius: 8px; text-align: right; white-space: nowrap; vertical-align: middle;
}
.sub-cereal  {background:#fff8dc;color:#997a00;}
.sub-fruta   {background:#ffe4e4;color:#b03030;}
.sub-verdura {background:#e8f5ee;color:#2e7d52;}
.sub-proteina{background:#f0e6ff;color:#6b4f9e;}
td.cell { padding: 2px; border-radius: 7px; vertical-align: middle; }
.cell-cereal  {background:#fffbea;} .cell-fruta   {background:#fff0f0;}
.cell-verdura {background:#f0fbf5;} .cell-proteina{background:#f7f0ff;}
.cell-edit {
  display: flex; align-items: center; justify-content: center;
  height: 36px; border: 1.5px dashed #ccc; border-radius: 6px;
  padding: 0 5px; cursor: text; overflow: hidden;
  transition: border-color 0.2s, background 0.2s;
  font-family: 'Nunito', sans-serif; font-weight: 700;
  color: #444; font-size: 13px; text-align: center;
  line-height: 36px; white-space: nowrap; outline: none;
}
.cell-edit:focus { border-color: #9b7fd4; border-style: solid; background: #faf5ff; }
.cell-edit:empty::before { content: attr(data-placeholder); color: #ccc; font-size: 11px; font-weight: 400; }
tr.spacer td { height: 6px; background: transparent; }

/* ── AUTOCOMPLETE DROPDOWN ── */
/* FIX: position:fixed para que no se corte por overflow:hidden de la tabla */
#acDropdown {
  position: fixed;
  z-index: 99998;
  background: white;
  border-radius: 12px;
  box-shadow: 0 8px 28px rgba(107,79,158,0.22);
  overflow-y: auto;
  max-height: 200px;
  min-width: 160px;
  max-width: 240px;
  border: 1.5px solid #e0d4f7;
  display: none;
  /* Permite scroll interno sin afectar layout */
  overscroll-behavior: contain;
}
#acDropdown.open { display: block; }
.ac-item {
  padding: 8px 14px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.82rem;
  font-weight: 700;
  color: #444;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: background 0.12s;
  border-bottom: 1px solid #f5f0ff;
}
.ac-item:last-child { border-bottom: none; }
.ac-item:hover, .ac-item.active { background: #f0e6ff; color: #6b4f9e; }
.ac-item strong { color: #7c3aed; }

.btn-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 22px; }
.btn {
  display: flex; align-items: center; gap: 7px; padding: 10px 22px;
  border: none; border-radius: 50px; font-family: 'Nunito', sans-serif;
  font-size: 0.88rem; font-weight: 800; cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 14px rgba(0,0,0,0.12);
}
.btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.17); }
.btn:active { transform: translateY(0); }
.btn-save {background:linear-gradient(135deg,#a78bfa,#7c3aed);color:#fff;}
.btn-pdf  {background:linear-gradient(135deg,#f9a8d4,#ec4899);color:#fff;}
.btn-clear{background:linear-gradient(135deg,#fca5a5,#ef4444);color:#fff;}
.footer { text-align: center; margin-top: 16px; font-size: 0.72rem; color: #ccc; }

#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #6b4f9e; color: white; padding: 9px 24px; border-radius: 50px;
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.85rem;
  opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 99999;
}
#toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- CALENDAR MODAL -->
<div id="calOverlay">
  <div id="calBox">
    <div class="cal-nav">
      <button id="calPrev">‹</button>
      <span class="cal-title" id="calTitle"></span>
      <button id="calNext">›</button>
    </div>

    <div class="cal-close-row"><button id="calClose">Cerrar</button></div>
  </div>
</div>

<div class="page">
  <div class="header">
    <div class="emojis">🌟 🥦 🍎 🥣 🍗 🌟</div>
    <h1>🍽️ Mi Plan de Alimentación Semanal</h1>
    <p>¡Comer bien es divertido y delicioso!</p>
  </div>

  <div class="controls-bar">
    <label>👦 Nombre:</label>
    <input type="text" id="childName" placeholder="Escribe tu nombre aquí..." oninput="autoSave()">
    <label>Del:</label>
    <button class="date-btn" id="btnStart">📅 <span id="lblStart">Seleccionar</span></button>
    <label>al:</label>
    <button class="date-btn" id="btnEnd">📅 <span id="lblEnd">Seleccionar</span></button>

  </div>

  <div class="legend">
    <div class="legend-item"><span class="legend-dot dot-cereal"></span>Cereal / Carbohidratos</div>
    <div class="legend-item"><span class="legend-dot dot-fruta"></span>Fruta</div>
    <div class="legend-item"><span class="legend-dot dot-verdura"></span>Verdura</div>
    <div class="legend-item"><span class="legend-dot dot-proteina"></span>Proteína</div>
  </div>

  <div class="tabs-bar" id="tabsBar"></div>
  <div id="sheetsContainer"></div>

  <div class="btn-row">
    <button class="btn btn-pdf"  onclick="downloadAllPDF()">📄 Descargar PDF</button>

</div>
<div id="toast"></div>
<!-- FIX: dropdown fuera del .page para que position:fixed funcione bien -->
<div id="acDropdown"></div>

<script>
const KEY = 'mealPlan_v5';

/* ── FOOD LISTS PER CATEGORY ── */
const FOODS = {
  cereal:   ['Arepa','Amaranto','Arroz','Avena','Cebada','Cereal de arroz','Cereal de maíz','Cereal de trigo','Cous cous','Galletas','Mazorca','Pancake','Pan','Papa amarilla','Papa blanca','Pasta','Plátano amarillo','Plátano verde','Quinoa','Waffle','Yuca'],
  fruta:    ['Arándanos','Banano','Ciruelas','Durazno','Fresas','Granadilla','Guanábana','Guayaba','Mandarina','Mango','Manzana roja','Manzana verde','Maracuyá','Moras','Naranja','Papaya','Pera','Piña','Sandía','Uvas rojas','Uvas verdes'],
  verdura:  ['Acelga','Aguacate','Ahuyama','Arveja','Berenjena','Brócoli','Cebolla','Champiñones','Coliflor','Espárragos','Espinaca','Habichuelas','Pepino','Pimentón','Rábano','Remolacha','Repollo','Tomate','Zanahoria','Zucchini verde','Zucchini amarillo'],
  proteina: ['Almendras','Arveja seca','Atún','Camarón','Carne de res','Carne de cerdo','Frijol rojo','Garbanzo','Hígado','Huevo de codorniz','Huevo de gallina','Lenteja','Maní','Pollo','Queso fresco','Róbalo','Salmón','Soya / tofu','Tilapia','Trucha','Yogur sin azúcar']
};

/* ══════════════════════════════════════════
   AUTOCOMPLETE — MOTOR CORREGIDO
   FIX 1: usa getBoundingClientRect() puro (sin sumar scrollY)
           porque el dropdown es position:fixed
   FIX 2: reposiciona en scroll para que siga a la celda
   FIX 3: categoría se lee siempre de div.dataset.category
          (no de un closure que podría quedar stale)
   ══════════════════════════════════════════ */
const acDrop    = document.getElementById('acDropdown');
let   acActive  = -1;
let   acCurrent = null;
let   acList    = [];

function normalize(s){
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}

/* Recalcula y aplica la posición del dropdown según la celda activa */
function acReposition(){
  if(!acCurrent || !acDrop.classList.contains('open')) return;
  const rect = acCurrent.getBoundingClientRect();

  /* Espacio disponible abajo y arriba */
  const spaceBelow = window.innerHeight - rect.bottom - 6;
  const spaceAbove = rect.top - 6;
  const dropH      = Math.min(200, acList.length * 37); // aprox altura

  let top, maxH;
  if(spaceBelow >= dropH || spaceBelow >= spaceAbove){
    /* Abajo */
    top  = rect.bottom + 4;
    maxH = Math.min(200, spaceBelow);
  } else {
    /* Arriba */
    maxH = Math.min(200, spaceAbove);
    top  = rect.top - 4 - Math.min(dropH, maxH);
  }

  acDrop.style.top      = top + 'px';
  acDrop.style.left     = rect.left + 'px';
  acDrop.style.minWidth = rect.width + 'px';
  acDrop.style.maxHeight= maxH + 'px';
}

function acShow(div){
  /* FIX: leer categoría desde dataset en lugar de closure */
  const category = div.dataset.category;
  const text     = div.textContent.trim();

  if(!text){ acHide(); return; }

  const norm   = normalize(text);
  const source = FOODS[category] || [];

  /* FIX: mostrar TODOS los items de la categoría si el texto coincide;
     búsqueda insensible a acentos y mayúsculas */
  acList = source.filter(f => normalize(f).includes(norm));

  if(!acList.length){ acHide(); return; }

  acActive  = -1;
  acCurrent = div;

  acDrop.innerHTML = acList.map((f, i) => {
    const normF  = normalize(f);
    const idx    = normF.indexOf(norm);
    let   display = f;
    if(idx >= 0){
      display = f.slice(0, idx)
        + '<strong>' + f.slice(idx, idx + text.length) + '</strong>'
        + f.slice(idx + text.length);
    }
    return `<div class="ac-item" data-i="${i}">${display}</div>`;
  }).join('');

  acDrop.classList.add('open');
  acReposition(); /* posicionar DESPUÉS de que el contenido esté renderizado */

  acDrop.querySelectorAll('.ac-item').forEach(el => {
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      acSelect(+el.dataset.i);
    });
  });
}

function acHide(){
  acDrop.classList.remove('open');
  acDrop.innerHTML = '';
  acActive = -1;
}

function acSelect(i){
  if(!acCurrent || i < 0 || i >= acList.length) return;
  acCurrent.textContent = acList[i];
  /* mover cursor al final */
  const range = document.createRange();
  const sel   = window.getSelection();
  range.selectNodeContents(acCurrent);
  range.collapse(false);
  sel.removeAllRanges();
  sel.addRange(range);
  acHide();
  autoSave();
}

function acKeyNav(e){
  if(!acDrop.classList.contains('open')) return;
  const items = acDrop.querySelectorAll('.ac-item');
  if(e.key === 'ArrowDown'){
    e.preventDefault();
    acActive = Math.min(acActive + 1, items.length - 1);
  } else if(e.key === 'ArrowUp'){
    e.preventDefault();
    acActive = Math.max(acActive - 1, 0);
  } else if(e.key === 'Enter' || e.key === 'Tab'){
    if(acActive >= 0){ e.preventDefault(); acSelect(acActive); return; }
    acHide(); return;
  } else if(e.key === 'Escape'){
    acHide(); return;
  } else { return; }
  items.forEach((el, i) => el.classList.toggle('active', i === acActive));
  if(acActive >= 0) items[acActive].scrollIntoView({ block: 'nearest' });
}

/* FIX: reposicionar al hacer scroll para que el dropdown siga a la celda */
window.addEventListener('scroll', acReposition, true);
window.addEventListener('resize', acReposition);

/* Cerrar al hacer click fuera */
document.addEventListener('mousedown', e => {
  if(!acDrop.contains(e.target) && e.target !== acCurrent) acHide();
});

/* ── CONSTANTES ── */
const MONTHS    = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DOWS      = ['Do','Lu','Ma','Mi','Ju','Vi','Sá'];
const DAY_ICONS_ALL = ['🌞','🌙','🔥','⚡','🌈','🎉','⭐'];
const DAY_NAMES_ES  = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

const meals = [
  { id:'desayuno', label:'☀️ Desayuno', hClass:'meal-desayuno',
    subs:[
      {id:'cereal',   icon:'🥣', label:'Cereal',   sClass:'sub-cereal',   cClass:'cell-cereal'},
      {id:'fruta',    icon:'🍎', label:'Fruta',     sClass:'sub-fruta',    cClass:'cell-fruta'},
      {id:'verdura',  icon:'🥦', label:'Verdura',   sClass:'sub-verdura',  cClass:'cell-verdura'}
    ]},
  { id:'almuerzo', label:'🌤️ Almuerzo', hClass:'meal-almuerzo',
    subs:[
      {id:'cereal',   icon:'🥣', label:'Cereal',   sClass:'sub-cereal',   cClass:'cell-cereal'},
      {id:'fruta',    icon:'🍎', label:'Fruta',     sClass:'sub-fruta',    cClass:'cell-fruta'},
      {id:'verdura',  icon:'🥦', label:'Verdura',   sClass:'sub-verdura',  cClass:'cell-verdura'},
      {id:'proteina', icon:'🍗', label:'Proteína',  sClass:'sub-proteina', cClass:'cell-proteina'}
    ]},
  { id:'cena', label:'🌙 Cena', hClass:'meal-cena',
    subs:[
      {id:'cereal',   icon:'🥣', label:'Cereal',   sClass:'sub-cereal',   cClass:'cell-cereal'},
      {id:'fruta',    icon:'🍎', label:'Fruta',     sClass:'sub-fruta',    cClass:'cell-fruta'},
      {id:'verdura',  icon:'🥦', label:'Verdura',   sClass:'sub-verdura',  cClass:'cell-verdura'},
      {id:'proteina', icon:'🍗', label:'Proteína',  sClass:'sub-proteina', cClass:'cell-proteina'}
    ]}
];

/* ── FECHAS ── */
let startDate = null, endDate = null, numWeeks = 0;

function fmt(d){ return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); }
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function isSame(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function weeksBetween(a,b){ return Math.max(1,Math.ceil((b-a)/(7*864e5))); }

/* ── CALENDARIO MODAL ── */
let calTarget = null, calCur = new Date();

function renderCal(){
  const y=calCur.getFullYear(), m=calCur.getMonth();
  document.getElementById('calTitle').textContent = MONTHS[m]+' '+y;
  const firstDow    = new Date(y,m,1).getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const today       = new Date();
  const selDate     = calTarget==='start' ? startDate : endDate;
  let html = DOWS.map(d=>`<div class="dow">${d}</div>`).join('');
  for(let i=0;i<firstDow;i++) html+=`<div></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dt=new Date(y,m,d);
    let cls='day';
    if(isSame(dt,today)) cls+=' today';
    if(selDate && isSame(dt,selDate)) cls+=' selected';
    html+=`<div class="${cls}" data-y="${y}" data-m="${m}" data-d="${d}">${d}</div>`;
  }
  document.getElementById('calGrid').innerHTML = html;
  document.querySelectorAll('#calGrid .day').forEach(el=>{
    el.addEventListener('click',()=>{
      const picked=new Date(+el.dataset.y,+el.dataset.m,+el.dataset.d);
      if(calTarget==='start'){
        startDate=picked;
        document.getElementById('lblStart').textContent=fmt(picked);
        if(endDate&&endDate<startDate){ endDate=new Date(startDate); document.getElementById('lblEnd').textContent=fmt(endDate); }
      } else {
        if(startDate&&picked<startDate){ alert('La fecha final no puede ser anterior al inicio.'); return; }
        endDate=picked; document.getElementById('lblEnd').textContent=fmt(picked);
      }
      closeCalModal(); onDatesChange();
    });
  });
}
function openCalModal(target){
  calTarget=target;
  calCur=target==='start'?(startDate?new Date(startDate):new Date()):(endDate?new Date(endDate):new Date());
  document.getElementById('calOverlay').classList.add('open'); renderCal();
}
function closeCalModal(){ document.getElementById('calOverlay').classList.remove('open'); }
document.getElementById('calPrev').onclick=()=>{ calCur.setMonth(calCur.getMonth()-1); renderCal(); };
document.getElementById('calNext').onclick=()=>{ calCur.setMonth(calCur.getMonth()+1); renderCal(); };
document.getElementById('calClose').onclick=closeCalModal;
document.getElementById('calOverlay').addEventListener('click',e=>{ if(e.target===document.getElementById('calOverlay')) closeCalModal(); });
document.getElementById('btnStart').onclick=()=>openCalModal('start');
document.getElementById('btnEnd').onclick=()=>openCalModal('end');

/* ── SHEETS ── */
function onDatesChange(){
  if(!startDate||!endDate) return;
  numWeeks=weeksBetween(startDate,endDate);
  document.getElementById('weekBadge').textContent=numWeeks+(numWeeks===1?' semana':' semanas');
  rebuildSheets(); autoSave();
}

function rebuildSheets(){
  const existing=collectCells();
  document.getElementById('tabsBar').innerHTML='';
  document.getElementById('sheetsContainer').innerHTML='';
  for(let w=0;w<numWeeks;w++){
    const ws=addDays(startDate,w*7), we=addDays(ws,6);
    const btn=document.createElement('button');
    btn.className='tab-btn'+(w===0?' active':'');
    btn.textContent=`Sem ${w+1}: ${fmt(ws)}`;
    btn.dataset.week=w; btn.onclick=()=>switchTab(w);
    document.getElementById('tabsBar').appendChild(btn);
    const sheet=document.createElement('div');
    sheet.className='week-sheet'+(w===0?' visible':'');
    sheet.id='sheet-'+w;
    const title=document.createElement('div');
    title.className='sheet-title';
    title.textContent=`📅 Semana ${w+1}: del ${fmt(ws)} al ${fmt(we)}`;
    sheet.appendChild(title);
    const dayHeaders=Array.from({length:7},(_,i)=>{
      const dd=addDays(ws,i); const dowIdx=dd.getDay();
      return `${DAY_ICONS_ALL[dowIdx]}<br>${DAY_NAMES_ES[dowIdx]}<br><small style="font-size:0.65rem;font-weight:700;color:#888">${dd.getDate()}/${dd.getMonth()+1}</small>`;
    });
    const wrap=document.createElement('div'); wrap.className='table-wrap';
    wrap.appendChild(buildTable(w,dayHeaders)); sheet.appendChild(wrap);
    document.getElementById('sheetsContainer').appendChild(sheet);
  }
  restoreCells(existing);
}

function switchTab(w){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',+b.dataset.week===w));
  document.querySelectorAll('.week-sheet').forEach(s=>s.classList.toggle('visible',s.id==='sheet-'+w));
}

/* ══════════════════════════════════════════
   BUILD TABLE — CELDAS CON AUTOCOMPLETE
   FIX: attachamos los listeners directamente aquí,
        pasando el div ya creado (sin closure sobre sub)
   ══════════════════════════════════════════ */
function buildTable(wi, dayHeaders){
  const tbl=document.createElement('table');
  const thead=document.createElement('thead');
  const hrow=document.createElement('tr');
  const c1=document.createElement('th'); c1.className='empty-corner'; c1.style.width='88px'; hrow.appendChild(c1);
  const c2=document.createElement('th'); c2.className='empty-corner'; c2.style.width='78px'; hrow.appendChild(c2);
  dayHeaders.forEach(h=>{ const th=document.createElement('th'); th.className='day-header'; th.innerHTML=h; hrow.appendChild(th); });
  thead.appendChild(hrow); tbl.appendChild(thead);

  const tbody=document.createElement('tbody');

  meals.forEach((meal, mi)=>{
    meal.subs.forEach((sub, si)=>{
      const tr=document.createElement('tr');

      /* Cabecera de comida (rowspan) */
      if(si===0){
        const td=document.createElement('td');
        td.rowSpan=meal.subs.length; td.className='meal-header '+meal.hClass;
        td.innerHTML=meal.label.replace(' ','<br>'); tr.appendChild(td);
      }

      /* Cabecera de sub-categoría */
      const std=document.createElement('td');
      std.className='sub-header '+sub.sClass;
      std.innerHTML=sub.icon+' '+sub.label; tr.appendChild(std);

      /* Celdas de los 7 días */
      for(let d=0;d<7;d++){
        const ctd=document.createElement('td'); ctd.className='cell '+sub.cClass;
        const div=document.createElement('div');
        div.className='cell-edit';
        div.contentEditable='true';
        div.dataset.id       = `w${wi}_${meal.id}_${sub.id}_${d}`;
        div.dataset.placeholder = '...';
        div.dataset.category = sub.id;   /* cereal | fruta | verdura | proteina */
        div.spellcheck=false;

        /* ── LISTENERS — FIX PRINCIPAL ──
           Se usa una IIFE para capturar sub.id en este ciclo,
           aunque en realidad leemos div.dataset.category en acShow,
           lo que elimina cualquier problema de closure stale. */
        div.addEventListener('input', () => {
          autoSave();
          acShow(div); /* FIX: pasamos el div, la categoría se lee dentro */
        });

        div.addEventListener('keydown', e => {
          acKeyNav(e);
          if(e.key === 'Enter' && !acDrop.classList.contains('open')){
            e.preventDefault(); div.blur();
          }
        });

        /* FIX: blur con delay para que el click en un item del dropdown
           se procese antes de que acHide() se ejecute */
        div.addEventListener('blur', () => setTimeout(acHide, 180));

        div.addEventListener('focus', () => {
          if(div.textContent.trim()) acShow(div);
        });

        div.addEventListener('paste', e => {
          e.preventDefault();
          const t=(e.clipboardData||window.clipboardData).getData('text/plain').replace(/\n/g,' ');
          document.execCommand('insertText', false, t);
        });

        ctd.appendChild(div); tr.appendChild(ctd);
      }
      tbody.appendChild(tr);
    });

    /* Spacer entre comidas */
    if(mi < meals.length-1){
      const sp=document.createElement('tr'); sp.className='spacer';
      const td=document.createElement('td'); td.colSpan=9; sp.appendChild(td); tbody.appendChild(sp);
    }
  });

  tbl.appendChild(tbody); return tbl;
}

/* ── PERSISTENCIA ── */
function collectCells(){
  const out={};
  /* FIX: usar textContent (no innerText) — innerText retorna "" en elementos
     ocultos con visibility:hidden o display:none en Chrome, lo que causaba
     que cambiar de tab sobreescribiera los datos de las semanas no visibles */
  document.querySelectorAll('.cell-edit').forEach(el=>{
    const val = el.textContent.trim();
    out[el.dataset.id] = val;
  });
  return out;
}
function restoreCells(cells){
  if(!cells) return;
  Object.entries(cells).forEach(([id,v])=>{
    const el=document.querySelector(`[data-id="${id}"]`);
    if(el&&v) el.textContent=v;
  });
}
function collect(){
  return {
    childName: document.getElementById('childName').value,
    dateStart: startDate ? fmt(startDate) : '',
    dateEnd:   endDate   ? fmt(endDate)   : '',
    cells: collectCells()
  };
}
function apply(d){
  if(!d) return;
  if(d.childName) document.getElementById('childName').value=d.childName;
  if(d.dateStart){
    const p=d.dateStart.split('/'); startDate=new Date(+p[2],+p[1]-1,+p[0]);
    document.getElementById('lblStart').textContent=d.dateStart;
  }
  if(d.dateEnd){
    const p=d.dateEnd.split('/'); endDate=new Date(+p[2],+p[1]-1,+p[0]);
    document.getElementById('lblEnd').textContent=d.dateEnd;
  }
  onDatesChange();
  if(d.cells) restoreCells(d.cells);
}
function autoSave(){ try{ localStorage.setItem(KEY,JSON.stringify(collect())); }catch(e){} }
function clearAll(){
  if(!confirm('¿Borrar todo el contenido? 🗑️')) return;
  document.querySelectorAll('.cell-edit').forEach(el=>el.innerText='');
  document.getElementById('childName').value='';
  try{ localStorage.removeItem(KEY); }catch(e){}
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

/* ── PDF DOWNLOAD ── */
function downloadAllPDF(){
  toast('⏳ Cargando librerías...');
  const libs=[
    {src:'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js',        check:()=>window.jspdf},
    {src:'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js', check:()=>window.html2canvas},
    {src:'https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js',                        check:()=>window.PDFLib}
  ];
  let loaded=0;
  libs.forEach(lib=>{
    if(lib.check()){ if(++loaded===libs.length) runPDF(); return; }
    const s=document.createElement('script'); s.src=lib.src;
    s.onload=()=>{ if(++loaded===libs.length) runPDF(); };
    s.onerror=()=>toast('❌ Sin conexión para cargar librerías');
    document.head.appendChild(s);
  });
}

async function runPDF(){
  toast('⏳ Generando PDF del plan...');
  const childName=document.getElementById('childName').value.trim();
  const name=childName?childName+' - Plan de alimentacion':'Plan de alimentacion';
  const pdfUrl='https://drayeiny.github.io/Plancomplementario/ALIMENTACIONCOMPLEMENTARIA.pdf';
  const btnRow=document.querySelector('.btn-row');
  const footer=document.querySelector('.footer');
  const tabsBar=document.getElementById('tabsBar');
  btnRow.style.display='none'; footer.style.display='none'; tabsBar.style.display='none';
  const CAPTURE_W=3508;
  /* Guardar datos ANTES de manipular el DOM para el PDF */
  const savedCells = collectCells();

  const pageImages=[];
  for(let w=0;w<numWeeks;w++){
    /* FIX: en lugar de display:none (que rompe textContent), removemos visible */
    document.querySelectorAll('.week-sheet').forEach(s=>s.classList.remove('visible'));
    document.getElementById('sheet-'+w).classList.add('visible');
    await new Promise(r=>setTimeout(r,150));
    const el=document.querySelector('.page');
    const canvas=await html2canvas(el,{
      scale:CAPTURE_W/el.scrollWidth, useCORS:true,
      scrollX:0, scrollY:-window.scrollY,
      windowWidth:el.scrollWidth, width:el.scrollWidth, height:el.scrollHeight
    });
    pageImages.push({dataUrl:canvas.toDataURL('image/png'),w:canvas.width,h:canvas.height});
  }
  btnRow.style.display=''; footer.style.display=''; tabsBar.style.display='';
  /* Restaurar tab 0 y reponer datos guardados */
  switchTab(0);
  restoreCells(savedCells);
  toast('⏳ Ensamblando PDF...');
  const {PDFDocument}=window.PDFLib;
  const planDoc=await PDFDocument.create();
  const mmToPt=mm=>mm*2.8346;
  const pageW=mmToPt(297), pageH=mmToPt(210), margin=mmToPt(4);
  for(const img of pageImages){
    const imgBytes=await fetch(img.dataUrl).then(r=>r.arrayBuffer());
    const embedded=await planDoc.embedPng(imgBytes);
    const page=planDoc.addPage([pageW,pageH]);
    const ratio=img.w/img.h;
    const maxW=pageW-margin*2, maxH=pageH-margin*2;
    let iW=maxW, iH=maxW/ratio;
    if(iH>maxH){ iH=maxH; iW=maxH*ratio; }
    page.drawImage(embedded,{x:(pageW-iW)/2,y:(pageH-iH)/2,width:iW,height:iH});
  }
  try{
    toast('⏳ Cargando PDF de alimentación complementaria...');
    const extBytes=await fetch(pdfUrl).then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.arrayBuffer(); });
    const extDoc=await PDFDocument.load(extBytes,{ignoreEncryption:true});
    const extPages=await planDoc.copyPages(extDoc,extDoc.getPageIndices());
    extPages.forEach(p=>planDoc.addPage(p));
    toast('✅ PDF combinado listo');
  } catch(err){
    console.warn('No se pudo cargar el PDF externo:',err);
    toast('⚠️ No se pudo adjuntar el PDF externo');
    await new Promise(r=>setTimeout(r,2000));
  }
  const pdfBytes=await planDoc.save();
  const blob=new Blob([pdfBytes],{type:'application/pdf'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url;
  a.download=name.replace(/\s+/g,' ').trim()+'.pdf'; a.click();
  URL.revokeObjectURL(url); toast('✅ PDF descargado');
}

/* ── BOOT ── */

startDate=new Date(today); endDate=new Date(today);
document.getElementById('lblStart').textContent=fmt(startDate);
document.getElementById('lblEnd').textContent=fmt(endDate);
onDatesChange();
try{ apply(JSON.parse(localStorage.getItem(KEY))); }catch(e){}
</script>
